# Uncomment the following lines to enable the Corne RGB Underglow
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y

# Effect on boot
CONFIG_ZMK_RGB_UNDERGLOW_EFFECT_START=0   # index of default effect, see list below
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=20     # brightness 0-100
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=0      # hue 0-359
CONFIG_ZMK_RGB_UNDERGLOW_SAT_START=100    # saturation 0-100
CONFIG_ZMK_RGB_UNDERGLOW_SPD_START=3      # animation speed 1-5

# Turn RGB off by default at boot (toggle on manually when needed)
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=n

# Keep working while USB-idle / not connected, useful since you're testing both halves
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n

# Uncomment the following line to enable the Corne OLED Display
CONFIG_ZMK_DISPLAY=y
