# Uncomment the following lines to enable the Corne RGB Underglow
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y
CONFIG_ZMK_RGB_UNDERGLOW_AUTO_OFF_IDLE=y

# Effect on boot: 0=solid, 1=breathe, 2=spectrum, 3=swirl
CONFIG_ZMK_RGB_UNDERGLOW_EFF_START=0
# Brightness 0-100
CONFIG_ZMK_RGB_UNDERGLOW_BRT_START=20
# Hue 0-359
CONFIG_ZMK_RGB_UNDERGLOW_HUE_START=0
# Saturation 0-100
CONFIG_ZMK_RGB_UNDERGLOW_SAT_START=100
# Animation speed 1-5
CONFIG_ZMK_RGB_UNDERGLOW_SPD_START=3

# Turn RGB off by default at boot (toggle on manually when needed)
CONFIG_ZMK_RGB_UNDERGLOW_ON_START=n

# Keep working while USB-idle / not connected, useful since you're testing both halves
CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n

# Uncomment the following line to enable the Corne OLED Display
CONFIG_ZMK_DISPLAY=y